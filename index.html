<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딸깍 유니온 — 링크 모음</title>
<meta property="og:title" content="딸깍 유니온 — 수도권 대학생 바이브 코딩 연합 동아리">
<meta property="og:description" content="코딩 몰라도 만드는 동아리. 직접 써보고 신청하세요.">
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  @font-face{
    font-family:'Moneygraphy-Rounded';
    src:url('https://cdn.jsdelivr.net/gh/fontbee/font@main/Toss/Moneygraphy-Rounded.woff2') format('woff2');
    font-display:swap;
  }
  :root{
    --paper:#eef1f7; --ink:#141a2e; --cobalt:#2f5bff; --bubble:#fff;
    --spark:#ffd44d; --muted:rgba(20,26,46,0.55);
    --display:'Moneygraphy-Rounded','Do Hyeon',sans-serif;
    --body:'Pretendard',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{ box-sizing:border-box; margin:0; }
  body{
    background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(47,91,255,0.12), transparent 60%), var(--paper);
    color:var(--ink); font-family:var(--body); min-height:100vh;
    display:flex; justify-content:center;
  }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition:none!important; } }
  .wrap{ width:100%; max-width:440px; padding:56px 22px 60px; }

  .head{ text-align:center; margin-bottom:36px; }
  .logo{
    font-family:var(--display); font-size:2.6rem; line-height:1.1;
  }
  .logo .spark{ background:linear-gradient(transparent 58%, var(--spark) 58%); padding:0 4px; }
  .desc{ color:var(--muted); font-size:0.92rem; margin-top:10px; font-weight:600; }
  .badge{
    display:inline-block; margin-top:14px;
    font-family:var(--mono); font-size:0.7rem; font-weight:700; letter-spacing:0.1em;
    border:2px solid var(--ink); border-radius:999px; padding:6px 16px; background:var(--bubble);
  }

  .section-label{
    font-family:var(--mono); font-size:0.7rem; font-weight:700; letter-spacing:0.14em;
    color:var(--cobalt); margin:28px 4px 12px;
  }
  a.link{
    display:flex; align-items:center; gap:14px;
    background:var(--bubble); border:2.5px solid var(--ink); border-radius:16px;
    box-shadow:4px 5px 0 var(--ink);
    padding:16px 18px; margin-bottom:12px; text-decoration:none; color:var(--ink);
    transition:transform .12s, box-shadow .12s;
  }
  a.link:hover{ transform:translate(-2px,-2px); box-shadow:6px 7px 0 var(--ink); }
  a.link:active{ transform:translate(0,0); box-shadow:2px 3px 0 var(--ink); }
  a.cta{ background:var(--cobalt); color:#fff; }
  a.cta .emoji{ background:rgba(255,255,255,0.2); }
  .emoji{
    flex-shrink:0; width:44px; height:44px; border-radius:12px;
    background:var(--paper); display:grid; place-items:center; font-size:22px;
  }
  .link .txt{ flex:1; }
  .link .t{ font-weight:800; font-size:1.02rem; }
  .link .s{ font-size:0.8rem; color:var(--muted); margin-top:2px; }
  a.cta .s{ color:rgba(255,255,255,0.8); }
  .arrow{ font-family:var(--display); font-size:1.3rem; opacity:0.5; }

  footer{ text-align:center; margin-top:40px; font-family:var(--mono); font-size:0.72rem; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo">딸깍 <span class="spark">유니온</span></div>

    <span class="badge">⚡ 1기 모집 중</span>
  </div>

  <div class="section-label">▶ 지금 신청하기</div>
  <a class="link cta" href="https://forms.gle/wo9VbVuPv19Yo7f88" target="_blank" rel="noopener">
    <span class="emoji">📝</span>
    <span class="txt"><div class="t">1기 지원서 작성</div><div class="s">3분이면 끝나요 · 선착순</div></span>
    <span class="arrow">→</span>
  </a>

  <div class="section-label">▶ 직접 써보기 (우리가 만든 것들)</div>
  <a class="link" href="https://vibe-code2.vercel.app/" target="_blank" rel="noopener">

    <span class="arrow">→</span>
  </a>
  <a class="link" href="https://vibe-code-tawny.vercel.app/" target="_blank" rel="noopener">
    <span class="emoji">✉️</span>
    <span class="txt"><div class="t">딸깍 공손 번역기</div><div class="s">교수님께 보낼 메일로 딸깍</div></span>
    <span class="arrow">→</span>
  </a>
  <a class="link" href="https://vibecode3-nine.vercel.app/" target="_blank" rel="noopener">
    <span class="emoji">🎨</span>
    <span class="txt"><div class="t">딸깍 이미지 공방</div><div class="s">행사 배너·썸네일 이미지 딸깍</div></span>
    <span class="arrow">→</span>
  </a>

  <div class="section-label">▶ 더 알아보기</div>
  <a class="link" href="https://unleashed-postage-694.notion.site/330ae266154e43b6998df7d6d3eafa33" target="_blank" rel="noopener" id="notion-link">
    <span class="emoji">📚</span>
    <span class="txt"><div class="t">6주 커리큘럼 보기</div><div class="s">노션에서 상세 일정 확인</div></span>
    <span class="arrow">→</span>
  </a>
  <a class="link" href="https://instagram.com/ddalkkak.union" target="_blank" rel="noopener">
    <span class="emoji">📷</span>
    <span class="txt"><div class="t">인스타그램</div><div class="s">@ddalkkak.union</div></span>
    <span class="arrow">→</span>
  </a>

  <footer>이 페이지도 딸깍 유니온 1주차 실습으로 만들 수 있어요 ⚡</footer>
</div>

</body>
</html>
